name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Setup temporary keychain and import certificate
        run: |
          KEYCHAIN_NAME="temp.keychain"
          NODE_PATH=$(which node)
          echo "Found Node executable at: $NODE_PATH"

          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 3600 "$KEYCHAIN_NAME"

          echo "${{ secrets.DEV_ID_CERTIFICATE_P12 }}" | base64 --decode > dev_cert.p12

          CERT_ID='Developer ID Application: Ontology Foundation Ltd (29B4VVVVKM)'
          curl --fail --location --show-error --silent \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            --output DeveloperIDG2CA.cer
          sudo security add-trusted-cert -d -r unspecified -k "$KEYCHAIN_NAME" DeveloperIDG2CA.cer
          rm -f DeveloperIDG2CA.cer

          security import dev_cert.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "${{ secrets.P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -T "$NODE_PATH"
          echo "import success"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
            "$KEYCHAIN_NAME"
          echo "partition list success"

          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_NAME"
          security set-keychain-settings -l -u -t 3600 "$KEYCHAIN_NAME"

          if security find-identity -p codesigning "$KEYCHAIN_NAME" | grep -q "$CERT_ID"; then
            echo "SUCCESS: Code signing identity '$CERT_ID' found in the temporary keychain."
          else
            echo "FAILURE: Code signing identity '$CERT_ID' not found. Codesign will likely fail."
            exit 1
          fi

      - name: Build macOS packages
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: yarn build:mac

      - name: Build Windows app
        run: yarn build:win

      - name: Build Linux app
        run: yarn build:linux

      - name: Clean up keychain and files
        if: always()
        run: |
          security delete-keychain temp.keychain || true
          rm -f dev_cert.p12

      - name: Generate checksums
        run: |
          echo "" > CHECKSUMS.md
          echo "CHANGELOG: $(git log -1 --format=%s ${{ github.ref_name }})" >> CHECKSUMS.md
          echo "## SHA256 Checksums" >> CHECKSUMS.md
          echo "| File | SHA256 Checksum |" >> CHECKSUMS.md
          echo "|------|-----------------|" >> CHECKSUMS.md
          find dist_electron -maxdepth 1 -type f \
            \( -name 'OWallet-*.deb' -o -name 'OWallet-*.exe' -o -name 'OWallet-*.AppImage' -o -name 'OWallet-*.dmg' \) \
            | sort | while IFS= read -r file; do
              checksum=$(shasum -a 256 "$file" | awk '{print $1}')
              echo "| $(basename "$file") | \`$checksum\` |" >> CHECKSUMS.md
            done

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHECKSUMS.md
          files: |
            dist_electron/*.deb
            dist_electron/*.AppImage
            dist_electron/*.dmg
            dist_electron/*.exe
